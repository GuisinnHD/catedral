// Nome bonito
function formatName(id) {
  return id.replace("minecraft:", "")
    .split("_")
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(" ");
}

// URL da textura
function getTexture(id) {
  const name = id.replace("minecraft:", "");
  return {
    item: `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.4/assets/minecraft/textures/item/${name}.png`,
    block: `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.4/assets/minecraft/textures/block/${name}.png`
  };
}

// Packs
function calc(total) {
  const packs = Math.floor(total / 64);
  const sobra = total % 64;
  return `${packs} packs + ${sobra}`;
}

// Ordenar
data.Materials.sort((a, b) => b.Total - a.Total);

const tabela = document.getElementById("tabela");
const stats = document.getElementById("stats");
const progressBar = document.getElementById("progress");

function render() {
  tabela.innerHTML = "";

  let feitos = 0;

  data.Materials.forEach((item, i) => {
    const salvo = localStorage.getItem("item_" + i) === "true";
    if (salvo) feitos++;

    const tr = document.createElement("tr");
    if (salvo) tr.classList.add("completed");

    const texture = getTexture(item.Item);

    tr.innerHTML = `
      <td><input type="checkbox" ${salvo ? "checked" : ""}></td>

      <td>
        <div class="item">
        <img 
            src="${texture.item}" 
            data-block="${texture.block}"
             onerror="if(!this.dataset.tentou){ this.src=this.dataset.block; this.dataset.tentou=true } else { this.src='https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.4/assets/minecraft/textures/item/barrier.png' }"
                >
<span>${formatName(item.Item)}</span>
        </div>
      </td>

      <td>${item.Total}</td>

      <td class="packs">
        ${calc(item.Total)}
        <div class="small">(${Math.ceil(item.Total/64)} stacks)</div>
      </td>
    `;

    tr.querySelector("input").addEventListener("change", () => {
      localStorage.setItem("item_" + i, !salvo);
      render();
    });

    tabela.appendChild(tr);
  });

  const percent = Math.round((feitos / data.Materials.length) * 100);

  stats.innerHTML = `Progresso: ${feitos}/${data.Materials.length} (${percent}%)`;
  progressBar.style.width = percent + "%";
}
